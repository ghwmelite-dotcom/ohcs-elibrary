name: Deploy Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Frontend uses same-origin /api/* via Worker route, so VITE_API_URL is
      # intentionally blank — relative paths resolve to the page's origin.
      VITE_API_URL: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ohcs-elibrary --branch=master --commit-dirty=true
