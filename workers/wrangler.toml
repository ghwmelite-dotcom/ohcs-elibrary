# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "ohcs-elibrary"
database_id = "2aa38a9e-e5e1-4e7a-a48e-f8edf7cc741d"

# R2 Storage binding for documents
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "ohcs-documents"

# KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "747355109d8a4b63a45a116b9c3208b1"

# AI binding for document analysis
[ai]
binding = "AI"

# Rate limiting
[limits]
cpu_ms = 50

# Use workers.dev subdomain (custom domain can be added later)
workers_dev = true

# Cron triggers for scheduled tasks
[triggers]
crons = [
  "0 * * * *",   # Run every hour at minute 0
  "*/15 * * * *" # Also run every 15 minutes for more frequent updates
]

# Development environment
[env.development]
vars = { ENVIRONMENT = "development" }

# Staging environment
[env.staging]
vars = { ENVIRONMENT = "staging" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
