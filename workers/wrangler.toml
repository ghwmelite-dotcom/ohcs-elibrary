name = "ohcs-elibrary-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"
# Non-secret config values only — all secrets set via `npx wrangler secret put <NAME>`
GOOGLE_DRIVE_REDIRECT_URI = "https://ohcs-elibrary.pages.dev/admin/integrations/google-drive/callback"
# The following are set as encrypted Cloudflare secrets (not in this file):
# JWT_SECRET, RESEND_API_KEY, GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET,
# GMAIL_REFRESH_TOKEN, PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY,
# GOOGLE_DRIVE_CLIENT_ID, GOOGLE_DRIVE_CLIENT_SECRET, CRON_SECRET

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "ohcs-elibrary"
database_id = "2aa38a9e-e5e1-4e7a-a48e-f8edf7cc741d"

# R2 Storage binding for documents
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "ohcs-documents"

# KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "747355109d8a4b63a45a116b9c3208b1"

# AI binding for document analysis
[ai]
binding = "AI"

# Rate limiting
[limits]
cpu_ms = 50

# Use workers.dev subdomain (custom domain can be added later)
workers_dev = true

# Cron triggers for scheduled tasks
[triggers]
crons = [
  "0 * * * *",   # Run every hour at minute 0
  "*/15 * * * *" # Also run every 15 minutes for more frequent updates
]

# Development environment
[env.development]
vars = { ENVIRONMENT = "development" }

# Staging environment
[env.staging]
vars = { ENVIRONMENT = "staging" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
