    <!-- Prevent FOUC & Loading Animation Styles -->
    <style>
      html {
        background-color: #0a0f0d;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }

      /* ========== SLEEK LOADING SCREEN ========== */
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0f0d 0%, #0d1a14 50%, #0a0f0d 100%);
        z-index: 9999;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }
      .app-loading.fade-out {
        opacity: 0;
        transform: scale(1.05);
        pointer-events: none;
      }

      /* Animated gradient background */
      .app-loading::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 107, 63, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse 60% 40% at 80% 100%, rgba(252, 209, 22, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse 50% 30% at 20% 80%, rgba(206, 17, 38, 0.05) 0%, transparent 50%);
        animation: ambientGlow 8s ease-in-out infinite;
      }

      @keyframes ambientGlow {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.1); }
      }

      /* Floating particles */
      .loading-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(252, 209, 22, 0.6);
        border-radius: 50%;
        animation: float 15s infinite ease-in-out;
      }
      .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
      .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; background: rgba(0, 107, 63, 0.5); }
      .particle:nth-child(3) { left: 80%; top: 30%; animation-delay: 4s; animation-duration: 14s; }
      .particle:nth-child(4) { left: 70%; top: 70%; animation-delay: 1s; animation-duration: 16s; background: rgba(0, 107, 63, 0.5); }
      .particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 3s; animation-duration: 20s; }
      .particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 5s; animation-duration: 13s; background: rgba(206, 17, 38, 0.4); }
      .particle:nth-child(7) { left: 90%; top: 50%; animation-delay: 2.5s; animation-duration: 17s; }
      .particle:nth-child(8) { left: 5%; top: 50%; animation-delay: 4.5s; animation-duration: 15s; background: rgba(0, 107, 63, 0.5); }

      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
        10% { opacity: 1; }
        50% { transform: translateY(-100px) translateX(30px) scale(1.5); opacity: 0.8; }
        90% { opacity: 1; }
      }

      /* Main loader container */
      .loader-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }

      /* Animated book icon */
      .book-loader {
        position: relative;
        width: 120px;
        height: 90px;
        margin: 0 auto 32px;
        perspective: 600px;
      }

      .book-loader .book {
        position: absolute;
        width: 60px;
        height: 80px;
        left: 50%;
        transform: translateX(-50%) rotateY(-25deg);
        transform-style: preserve-3d;
        animation: bookOpen 3s ease-in-out infinite;
      }

      .book-loader .book-spine {
        position: absolute;
        left: 0;
        width: 8px;
        height: 100%;
        background: linear-gradient(180deg, #006B3F 0%, #004d2d 100%);
        transform: rotateY(90deg) translateZ(-4px);
        border-radius: 2px 0 0 2px;
      }

      .book-loader .book-cover {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #006B3F 0%, #004d2d 100%);
        border-radius: 0 4px 4px 0;
        transform-origin: left;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        border: 1px solid rgba(252, 209, 22, 0.2);
      }

      .book-loader .book-cover::before {
        content: '';
        position: absolute;
        top: 8px;
        left: 8px;
        right: 8px;
        height: 2px;
        background: rgba(252, 209, 22, 0.4);
        border-radius: 1px;
      }

      .book-loader .book-cover::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 8px;
        right: 8px;
        height: 2px;
        background: rgba(252, 209, 22, 0.4);
        border-radius: 1px;
      }

      .book-loader .book-pages {
        position: absolute;
        width: calc(100% - 4px);
        height: calc(100% - 8px);
        top: 4px;
        right: 2px;
        background: linear-gradient(90deg, #f5f0e6 0%, #e8e0d0 100%);
        border-radius: 0 3px 3px 0;
        transform-origin: left;
      }

      .book-loader .page {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #f8f5ef;
        border-radius: 0 3px 3px 0;
        transform-origin: left;
        box-shadow: -1px 0 1px rgba(0,0,0,0.05);
      }

      .book-loader .page:nth-child(1) { animation: pageFlip 3s ease-in-out infinite; animation-delay: 0.1s; }
      .book-loader .page:nth-child(2) { animation: pageFlip 3s ease-in-out infinite; animation-delay: 0.2s; }
      .book-loader .page:nth-child(3) { animation: pageFlip 3s ease-in-out infinite; animation-delay: 0.3s; }

      @keyframes bookOpen {
        0%, 100% { transform: translateX(-50%) rotateY(-25deg); }
        50% { transform: translateX(-50%) rotateY(-15deg); }
      }

      @keyframes pageFlip {
        0%, 30%, 100% { transform: rotateY(0deg); }
        50%, 70% { transform: rotateY(-30deg); }
      }

      /* AI sparkle effect */
      .ai-sparkle {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 32px;
        height: 32px;
        animation: sparkleRotate 4s linear infinite;
      }

      .ai-sparkle svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 8px rgba(252, 209, 22, 0.6));
      }

      @keyframes sparkleRotate {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); }
      }

      /* Glowing ring */
      .glow-ring {
        position: absolute;
        inset: -20px;
        border: 2px solid transparent;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(252, 209, 22, 0.3), rgba(0, 107, 63, 0.3)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: ringPulse 2s ease-in-out infinite;
      }

      @keyframes ringPulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      /* Typography */
      .loading-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        color: #fff;
        margin: 0 0 8px;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .loading-title .highlight {
        background: linear-gradient(135deg, #FCD116 0%, #f0c000 50%, #FCD116 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s ease-in-out infinite;
        background-size: 200% 100%;
      }

      @keyframes shimmer {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .loading-subtitle {
        font-family: 'Source Sans 3', system-ui, sans-serif;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.6);
        margin: 0 0 32px;
        letter-spacing: 0.02em;
      }

      /* Progress bar */
      .loading-progress {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
      }

      .loading-progress-bar {
        position: absolute;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #006B3F, #FCD116, #006B3F);
        background-size: 200% 100%;
        border-radius: 3px;
        animation: progressSlide 1.5s ease-in-out infinite;
      }

      @keyframes progressSlide {
        0% { left: -40%; background-position: 0% 50%; }
        100% { left: 100%; background-position: 100% 50%; }
      }

      /* Ghana flag accent */
      .ghana-stripe {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        opacity: 0.8;
      }

      .ghana-stripe span {
        width: 24px;
        height: 4px;
        border-radius: 2px;
        animation: stripeGlow 2s ease-in-out infinite;
      }

      .ghana-stripe span:nth-child(1) { background: #CE1126; animation-delay: 0s; }
      .ghana-stripe span:nth-child(2) { background: #FCD116; animation-delay: 0.2s; }
      .ghana-stripe span:nth-child(3) { background: #006B3F; animation-delay: 0.4s; }

      @keyframes stripeGlow {
        0%, 100% { opacity: 0.6; transform: scaleX(1); }
        50% { opacity: 1; transform: scaleX(1.2); }
      }
    </style>
  </head>

    <!-- Register Service Worker -->
    <script>
      // Remove loading screen when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('app-loading');
        if (loader) {
          setTimeout(function() {
            loader.classList.add('fade-out');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }, 500);
        }
      });

      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('[App] ServiceWorker registered:', registration.scope);

              // Check for updates
              registration.addEventListener('updatefound', function() {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New content available, show update prompt
                      if (confirm('New version available! Reload to update?')) {
                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch(function(error) {
              console.error('[App] ServiceWorker registration failed:', error);
            });

          // Handle controller change (new SW activated)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            console.log('[App] New service worker activated');
          });
        });
      }

      // Handle standalone mode detection
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('[App] Running in standalone mode');
        document.documentElement.classList.add('pwa-standalone');
      }

      // iOS standalone detection
      if (window.navigator.standalone === true) {
        console.log('[App] Running as iOS PWA');
        document.documentElement.classList.add('ios-pwa');
      }
    </script>
