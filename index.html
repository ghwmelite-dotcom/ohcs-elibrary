    <!-- Prevent FOUC -->

      html {

        margin: 0;

        min-height: 100vh;
      }
      /* Smooth loading transition */
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #006B3F 0%, #004d2e 100%);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      .app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .app-loading svg {
        width: 80px;
        height: 80px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>

    <!-- Register Service Worker -->
    <script>
      // Remove loading screen when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('app-loading');
        if (loader) {
          setTimeout(function() {
            loader.classList.add('fade-out');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }, 500);
        }
      });

      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('[App] ServiceWorker registered:', registration.scope);

              // Check for updates
              registration.addEventListener('updatefound', function() {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New content available, show update prompt
                      if (confirm('New version available! Reload to update?')) {
                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch(function(error) {
              console.error('[App] ServiceWorker registration failed:', error);
            });

          // Handle controller change (new SW activated)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            console.log('[App] New service worker activated');
          });
        });
      }

      // Handle standalone mode detection
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('[App] Running in standalone mode');
        document.documentElement.classList.add('pwa-standalone');
      }

      // iOS standalone detection
      if (window.navigator.standalone === true) {
        console.log('[App] Running as iOS PWA');
        document.documentElement.classList.add('ios-pwa');
      }
    </script>
