<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="apBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#008B4F"/>
      <stop offset="100%" style="stop-color:#006B3F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="url(#apBg)"/>

  <!-- Simplified open book -->
  <g transform="translate(90, 80)">
    <!-- Left page -->
    <path d="M-5 -30 L-5 40 Q-30 35 -55 38 L-55 -27 Q-30 -30 -5 -25 Z" fill="#FFFFFF"/>
    <!-- Right page -->
    <path d="M5 -30 L5 40 Q30 35 55 38 L55 -27 Q30 -30 5 -25 Z" fill="#F5F5F5"/>
    <!-- Spine -->
    <rect x="-4" y="-30" width="8" height="70" fill="#E0E0E0"/>
  </g>

  <!-- Black Star -->
  <g transform="translate(90, 135)">
    <polygon points="0,-18 4,-5 18,-5 7,-2 11,11 0,4 -11,11 -7,-2 -18,-5 -4,-5" fill="#000000" stroke="#FCD116" stroke-width="2"/>
  </g>

  <!-- Gold accent -->
  <path d="M30 160 Q90 150 150 160" stroke="#FCD116" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
